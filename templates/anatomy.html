<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Anatomy — Visualize Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/anatomy.css') }}">
</head>
<body>
    <div class="anatomy-wrapper">
        <div class="topbar">
            <div class="topbar-left">
                <button class="back-btn" id="backBtn">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                        <path d="M16 10H4M4 10L9 5M4 10L9 15" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                    Back
                </button>
                <div class="logo-small">CODE ANATOMY</div>
            </div>
            <button class="analyze-btn" id="analyzeBtn" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M12 2V6M12 18V22M2 12H6M18 12H22" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                Analyze Flow
            </button>
        </div>

        <div class="anatomy-layout">
            <!-- Code Input -->
            <div class="code-pane">
                <div class="pane-header">
                    <div class="tabs">
                        <div class="tab active">
                            <span class="tab-icon">●</span>
                            <span>source</span>
                        </div>
                    </div>
                    <div class="header-actions">
                        <select id="languageSelect" class="language-dropdown">
                            <option value="">Language</option>
                            <option value="python">Python</option>
                            <option value="c">C</option>
                        </select>
                        <button class="header-btn" id="clearBtn" title="Clear">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <path d="M12 4L4 12M4 4L12 12" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="editor-content">
                    <div class="line-numbers" id="lineNumbers">1</div>
                    <textarea id="codeInput" class="code-area" spellcheck="false" placeholder="// Select a language, then paste your code..."></textarea>
                    <pre id="codeHighlight" class="code-highlight"><code></code></pre>
                </div>
            </div>

            <div class="divider"></div>

            <!-- Diagram Output -->
            <div class="diagram-pane">
                <div class="pane-header">
                    <div class="diagram-tabs">
                        <button class="diagram-tab active" id="diagramViewBtn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                                <rect x="8" y="14" width="8" height="7"/>
                            </svg>
                            Diagram
                        </button>
                        <button class="diagram-tab" id="codeViewBtn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/>
                            </svg>
                            Mermaid
                        </button>
                    </div>
                    <div class="header-actions">
                        <button class="header-btn" id="copyMermaidBtn" title="Copy Mermaid Code">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <rect x="5" y="5" width="9" height="9" stroke="currentColor" stroke-width="1.5" fill="none"/>
                                <path d="M3 11V3C3 2.44772 3.44772 2 4 2H10" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                        </button>
                        <button class="header-btn" id="downloadBtn" title="Download SVG">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <path d="M8 2V10M8 10L5 7M8 10L11 7" stroke="currentColor" stroke-width="1.5"/>
                                <path d="M3 12V13H13V12" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                        </button>
                        <div class="zoom-controls">
                            <button class="zoom-btn" id="zoomOutBtn" title="Zoom Out">−</button>
                            <span class="zoom-level" id="zoomLevel">100%</span>
                            <button class="zoom-btn" id="zoomInBtn" title="Zoom In">+</button>
                            <button class="zoom-btn" id="zoomResetBtn" title="Fit">⊙</button>
                        </div>
                    </div>
                </div>
                <div class="diagram-content" id="diagramContent">
                    <div class="diagram-placeholder" id="diagramPlaceholder">
                        <div class="placeholder-icon">
                            <svg width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                                <rect x="18" y="4" width="28" height="12" rx="3"/>
                                <rect x="4" y="28" width="24" height="12" rx="3"/>
                                <rect x="36" y="28" width="24" height="12" rx="3"/>
                                <rect x="18" y="50" width="28" height="12" rx="3"/>
                                <path d="M32 16V28M16 40V46L32 50M48 40V46L32 50"/>
                            </svg>
                        </div>
                        <p class="placeholder-title">Code Anatomy Visualization</p>
                        <p class="placeholder-subtitle">Paste code and click Analyze Flow</p>
                    </div>
                    <div class="diagram-loading" id="diagramLoading" style="display:none;">
                        <div class="spinner"></div>
                        <p>Analyzing code structure...</p>
                    </div>
                    <div class="diagram-container" id="diagramContainer" style="display:none;"></div>
                    <div class="mermaid-raw" id="mermaidRaw" style="display:none;">
                        <pre><code id="mermaidCodeDisplay"></code></pre>
                    </div>
                </div>
            </div>
        </div>

        <div class="statusbar">
            <div class="status-left"><span id="statusText">Ready</span></div>
            <div class="status-right">
                <span id="languageStatus">No language selected</span>
                <span id="lineCount">Ln 1, Col 1</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="{{ url_for('static', filename='js/detect.js') }}"></script>
    <script src="{{ url_for('static', filename='js/anatomy.js') }}"></script>
</body>
</html>
