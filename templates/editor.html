<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Anatomy - Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/editor.css') }}">
</head>
<body>
    <div class="editor-wrapper">
        <div class="topbar">
            <div class="topbar-left">
                <button class="back-btn" id="backBtn">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                        <path d="M16 10H4M4 10L9 5M4 10L9 15" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                    Back
                </button>
                <div class="logo-small">CODE ANATOMY</div>
            </div>
            <button class="process-btn" id="processBtn" disabled>
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                    <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                Generate Comments
            </button>
        </div>

        <div class="editor-layout">
            <div class="editor-pane">
                <div class="pane-header">
                    <div class="tabs">
                        <div class="tab active">
                            <span class="tab-icon">●</span>
                            <span>input</span>
                        </div>
                    </div>
                    <div class="header-actions">
                        <select id="languageSelect" class="language-dropdown">
                            <option value="">Select Language</option>
                            <option value="python">Python</option>
                            <option value="c">C</option>
                        </select>
                        <button class="header-btn" id="clearBtn" title="Clear">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <path d="M12 4L4 12M4 4L12 12" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="editor-content">
                    <div class="line-numbers" id="lineNumbers1">1</div>
                    <textarea id="codeInput" class="code-area" spellcheck="false" placeholder="// Select a language first, then paste your code here..."></textarea>
                    <pre id="codeHighlight1" class="code-highlight"><code></code></pre>
                </div>
            </div>

            <div class="divider"></div>

            <div class="editor-pane">
                <div class="pane-header">
                    <div class="tabs">
                        <div class="tab active">
                            <span class="tab-icon">●</span>
                            <span>output</span>
                        </div>
                    </div>
                    <div class="header-actions">
                        <button class="header-btn" id="copyBtn" title="Copy">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <rect x="5" y="5" width="9" height="9" stroke="currentColor" stroke-width="1.5" fill="none"/>
                                <path d="M3 11V3C3 2.44772 3.44772 2 4 2H10" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="editor-content">
                    <div class="line-numbers" id="lineNumbers2">1</div>
                    <textarea id="codeOutput" class="code-area" spellcheck="false" placeholder="// Commented code will appear here..." readonly></textarea>
                    <pre id="codeHighlight2" class="code-highlight"><code></code></pre>
                </div>
            </div>
        </div>

        <div class="statusbar">
            <div class="status-left">
                <span id="statusText">Ready</span>
            </div>
            <div class="status-right">
                <span id="languageStatus">No language selected</span>
                <span id="lineCount">Ln 1, Col 1</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="{{ url_for('static', filename='js/editor.js') }}"></script>
</body>
</html>
