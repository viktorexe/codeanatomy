<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Anatomy — Complexity Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/analysis.css') }}">
</head>
<body>
    <div class="analysis-wrapper">
        <div class="topbar">
            <div class="topbar-left">
                <button class="back-btn" id="backBtn">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M16 10H4M4 10L9 5M4 10L9 15" stroke="currentColor" stroke-width="1.5"/></svg>
                    Back
                </button>
                <div class="logo-small">CODE ANATOMY</div>
            </div>
            <button class="analyze-btn" id="analyzeBtn" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                Analyze Complexity
            </button>
        </div>

        <div class="analysis-layout">
            <!-- Code Input -->
            <div class="code-pane">
                <div class="pane-header">
                    <div class="tabs"><div class="tab active"><span class="tab-icon">●</span><span>source</span></div></div>
                    <div class="header-actions">
                        <select id="languageSelect" class="language-dropdown">
                            <option value="">Language</option>
                            <option value="python">Python</option>
                            <option value="c">C</option>
                        </select>
                        <button class="header-btn" id="clearBtn" title="Clear">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 4L4 12M4 4L12 12" stroke="currentColor" stroke-width="1.5"/></svg>
                        </button>
                    </div>
                </div>
                <div class="editor-content">
                    <div class="line-numbers" id="lineNumbers">1</div>
                    <textarea id="codeInput" class="code-area" spellcheck="false" placeholder="// Select a language, then paste your code..."></textarea>
                    <pre id="codeHighlight" class="code-highlight"><code></code></pre>
                </div>
            </div>

            <div class="divider"></div>

            <!-- Analysis Results -->
            <div class="results-pane">
                <div class="pane-header">
                    <div class="tabs"><div class="tab active"><span class="tab-icon">●</span><span>analysis</span></div></div>
                </div>
                <div class="results-content" id="resultsContent">
                    <!-- Placeholder -->
                    <div class="results-placeholder" id="resultsPlaceholder">
                        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.25">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke-linejoin="round"/>
                        </svg>
                        <p class="placeholder-title">Complexity Analysis</p>
                        <p class="placeholder-sub">Paste code and click Analyze Complexity</p>
                    </div>
                    <!-- Loading -->
                    <div class="results-loading" id="resultsLoading" style="display:none;">
                        <div class="spinner"></div>
                        <p>Analyzing complexity...</p>
                    </div>
                    <!-- Results Cards -->
                    <div class="results-cards" id="resultsCards" style="display:none;">
                        <!-- Algorithm Card -->
                        <div class="card card-algorithm">
                            <div class="card-label">Algorithm</div>
                            <div class="card-value" id="algoName">—</div>
                            <div class="card-desc" id="algoDesc">—</div>
                            <div class="rating-badge" id="ratingBadge">—</div>
                        </div>
                        <!-- Time & Space Row -->
                        <div class="complexity-row">
                            <div class="card card-time">
                                <div class="card-label">Time Complexity</div>
                                <div class="bigo" id="timeNotation">—</div>
                                <div class="complexity-detail">
                                    <span class="detail-label">Best</span><span class="detail-value" id="timeBest">—</span>
                                </div>
                                <div class="complexity-detail">
                                    <span class="detail-label">Average</span><span class="detail-value" id="timeAvg">—</span>
                                </div>
                                <div class="complexity-detail">
                                    <span class="detail-label">Worst</span><span class="detail-value" id="timeWorst">—</span>
                                </div>
                                <div class="card-explain" id="timeExplain">—</div>
                            </div>
                            <div class="card card-space">
                                <div class="card-label">Space Complexity</div>
                                <div class="bigo" id="spaceNotation">—</div>
                                <div class="card-explain" id="spaceExplain">—</div>
                            </div>
                        </div>
                        <!-- Tips Card -->
                        <div class="card card-tips">
                            <div class="card-label">Optimization Tips</div>
                            <ul class="tips-list" id="tipsList"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="statusbar">
            <div class="status-left"><span id="statusText">Ready</span></div>
            <div class="status-right">
                <span id="languageStatus">No language selected</span>
                <span id="lineCount">Ln 1, Col 1</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="{{ url_for('static', filename='js/detect.js') }}"></script>
    <script src="{{ url_for('static', filename='js/analysis.js') }}"></script>
</body>
</html>
