<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Anatomy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="bg-gradient bg-gradient-1"></div>
    <div class="bg-gradient bg-gradient-2"></div>
    <div class="bg-gradient bg-gradient-3"></div>
    
    <div class="app">
        <nav class="navbar">
            <div class="logo">CODE ANATOMY</div>
            <div class="nav-links">
                <a href="#">Documentation</a>
                <a href="#">Source Code</a>
            </div>
        </nav>

        <main class="main">
            <div class="content">
                <h1 class="title">Intelligent Code<br>Documentation System</h1>
                <p class="subtitle">Transform uncommented code into professionally documented software.<br>Enterprise-grade accuracy. Instant results.</p>
                
                <div class="actions">
                    <button class="btn btn-primary" id="addCommentsBtn">
                        <span>Add Comments</span>
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </button>
                    <button class="btn btn-secondary" id="removeCommentsBtn" disabled>
                        <span>Remove Comments</span>
                    </button>
                </div>
            </div>
        </main>
    </div>



    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
